name: 'Install dependencies (pnpm)'
description: 'Restores the pnpm store from cache and runs pnpm install --frozen-lockfile.'

inputs:
  working-directory:
    description: 'Directory containing package.json and pnpm-lock.yaml.'
    required: false
    default: '.'

outputs:
  cache-hit:
    description: 'true when the pnpm store cache was restored from an exact key match.'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
