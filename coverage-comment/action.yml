name: 'Coverage comment'
description: 'Posts a PR comment with Jest coverage summaries and optional JUnit test stats. Wraps MishaKav/jest-coverage-comment with monorepo auto-discovery.'

inputs:
  coverage-summary-path:
    description: 'Path to a single coverage-summary.json file. When set, skips auto-discovery and uses this file directly.'
    required: false
    default: ''
  create-new-comment:
    description: "When 'true', creates a new comment on every push. When 'false', updates the existing comment."
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for posting PR comments. Pass secrets.GITHUB_TOKEN from the consuming workflow.'
    required: true
  junitxml-path:
    description: 'Path to a JUnit XML file for test stats in the comment. Passed through to MishaKav/jest-coverage-comment.'
    required: false
    default: ''
  title:
    description: 'Title for the PR comment.'
    required: false
    default: 'Coverage Report'
  working-directory:
    description: 'Directory to search for coverage-summary.json files.'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Discover coverage files
      id: discover
      shell: bash
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        COVERAGE_SUMMARY_PATH: ${{ inputs.coverage-summary-path }}
      run: bash "${{ github.action_path }}/discover.sh"

    - name: Post coverage comment
      if: steps.discover.outputs.multiple_files != ''
      uses: MishaKav/jest-coverage-comment@58072a21b8b7f84d36a6e21b5d9a0cad08bc9d75
      with:
        github-token: ${{ inputs.github-token }}
        title: ${{ inputs.title }}
        create-new-comment: ${{ inputs.create-new-comment }}
        multiple-files: ${{ steps.discover.outputs.multiple_files }}
        junitxml-path: ${{ inputs.junitxml-path }}
