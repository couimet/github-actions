name: 'Run BATS tests'
description: 'Runs BATS tests against a configurable directory by wrapping the SHA-pinned bats-core/bats-action. BATS version is pinned for reproducibility and parity with the local brew stable.'

inputs:
  assert-install:
    description: 'Install the bats-assert helper library.'
    required: false
    default: 'true'
  bats-version:
    description: 'BATS version installed by bats-core/bats-action. Pinned (not floating on latest) so CI matches the local brew stable.'
    required: false
    default: '1.13.0'
  detik-install:
    description: 'Install the bats-detik helper library.'
    required: false
    default: 'false'
  file-install:
    description: 'Install the bats-file helper library.'
    required: false
    default: 'false'
  formatter:
    description: 'BATS output formatter passed as --formatter (e.g. tap, junit). Empty uses the default pretty output.'
    required: false
    default: ''
  recursive:
    description: 'Recurse into subdirectories of test-directory.'
    required: false
    default: 'true'
  support-install:
    description: 'Install the bats-support helper library.'
    required: false
    default: 'true'
  test-directory:
    description: 'Directory containing .bats test files.'
    required: false
    default: 'bats-tests/'
  publish-comment:
    description: 'Post a sticky PR comment with test result counts via publish-pr-comment.'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for posting the comment. Pass secrets.GITHUB_TOKEN from the consuming workflow. Required only when publish-comment is true.'
    required: false
    default: ''
  comment-header:
    description: 'Unique header that identifies the BATS comment across re-runs (sticky update behavior).'
    required: false
    default: 'BATS Test Results'

runs:
  using: composite
  steps:
    # The bats-action ref is pinned by SHA and intentionally NOT a caller input:
    # GitHub forbids ${{ }} expressions in a step's `uses:`, so bump it via PR here.
    # The configurable lever is bats-version below (pinned to the brew stable for
    # local/CI parity; bump deliberately on `brew upgrade`).
    - name: Install BATS
      uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
      with:
        bats-version: ${{ inputs.bats-version }}
        support-install: ${{ inputs.support-install }}
        assert-install: ${{ inputs.assert-install }}
        file-install: ${{ inputs.file-install }}
        detik-install: ${{ inputs.detik-install }}

    - name: Run BATS
      id: bats-run
      shell: bash
      env:
        TEST_DIRECTORY: ${{ inputs.test-directory }}
        FORMATTER: ${{ inputs.formatter }}
        RECURSIVE: ${{ inputs.recursive }}
        PUBLISH_COMMENT: ${{ inputs.publish-comment }}
      run: bash "${{ github.action_path }}/run.sh"

    - name: Publish BATS test results
      if: always() && inputs.publish-comment == 'true' && steps.bats-run.outputs.total != '' && github.event_name == 'pull_request'
      uses: couimet/github-actions/publish-pr-comment@main
      with:
        github-token: ${{ inputs.github-token }}
        header: ${{ inputs.comment-header }}
        comment-file: ${{ runner.temp }}/bats-comment.md
