name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  self-test:
    name: Self-test composite actions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js & pnpm
        id: setup
        uses: ./setup-node-pnpm
        with:
          working-directory: tests

      - name: Install dependencies
        id: install
        uses: ./install-deps
        with:
          working-directory: tests

      - name: Verify resolved versions match fixture
        # Deliberately inline. Extract to scripts/verify-versions.sh (and
        # BATS-test it via the action from issue #1) once a third composite
        # action duplicates this logic. See conventions in issue #3 comments.
        shell: bash
        env:
          NODE_VERSION_OUTPUT: ${{ steps.setup.outputs.node-version }}
          PNPM_VERSION_OUTPUT: ${{ steps.setup.outputs.pnpm-version }}
          CACHE_HIT: ${{ steps.install.outputs.cache-hit }}
        run: |
          set -euo pipefail
          expected_node="$(tr -d '[:space:]' < .nvmrc)"
          expected_node="${expected_node#v}"
          actual_node="${NODE_VERSION_OUTPUT#v}"
          expected_pnpm="$(jq -r '.packageManager' tests/package.json | sed 's/^pnpm@//')"

          echo "Resolved Node version : ${NODE_VERSION_OUTPUT} (expected ${expected_node}[.x.y])"
          echo "Resolved pnpm version : ${PNPM_VERSION_OUTPUT} (expected ${expected_pnpm})"
          echo "Cache hit              : ${CACHE_HIT}"

          case "$actual_node" in
            "$expected_node"|"$expected_node".*) ;;
            *)
              echo "::error::Node version mismatch: expected ${expected_node}[.x.y], got ${actual_node}"
              exit 1
              ;;
          esac

          if [[ "$PNPM_VERSION_OUTPUT" != "$expected_pnpm" ]]; then
            echo "::error::pnpm version mismatch: expected ${expected_pnpm}, got ${PNPM_VERSION_OUTPUT}"
            exit 1
          fi
