name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  self-test:
    name: Self-test composite actions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js & pnpm
        id: setup
        uses: ./setup-node-pnpm
        with:
          working-directory: tests

      - name: Install dependencies
        id: install
        uses: ./install-deps
        with:
          working-directory: tests

      - name: Verify resolved versions match fixture
        shell: bash
        env:
          NODE_VERSION_OUTPUT: ${{ steps.setup.outputs.node-version }}
          PNPM_VERSION_OUTPUT: ${{ steps.setup.outputs.pnpm-version }}
          CACHE_HIT: ${{ steps.install.outputs.cache-hit }}
        run: bash ./scripts/verify-versions.sh

      - name: Run shell tests (BATS)
        uses: ./bats-test
        with:
          test-directory: tests/shell
