name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  self-test:
    name: Self-test composite actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Verify action coverage
        run: make check-actions

      - name: Setup Node.js & pnpm
        id: setup
        uses: ./setup-node-pnpm
        with:
          working-directory: tests

      - name: Install dependencies
        id: install
        uses: ./install-deps
        with:
          working-directory: tests

      - name: Verify resolved versions match fixture
        shell: bash
        env:
          NODE_VERSION_OUTPUT: ${{ steps.setup.outputs.node-version }}
          PNPM_VERSION_OUTPUT: ${{ steps.setup.outputs.pnpm-version }}
          CACHE_HIT: ${{ steps.install.outputs.cache-hit }}
        run: bash ./scripts/verify-versions.sh

      - name: Lint markdown
        uses: ./markdownlint

      - name: Check formatting
        uses: ./prettier

      - name: Lint shell scripts
        uses: ./shellcheck

      - name: Test format action
        uses: ./format
        with:
          working-directory: tests

      - name: Test lint action
        uses: ./lint
        with:
          working-directory: tests

      - name: Test build action
        uses: ./build
        with:
          working-directory: tests

      - name: Test test action
        uses: ./test
        with:
          working-directory: tests

      - name: Test guard-versions action
        uses: ./guard-versions
        with:
          working-directory: tests
          base-ref: HEAD
          head-ref: HEAD

      - name: Test typescript-ci action
        uses: ./typescript-ci
        with:
          working-directory: tests
          guard-versions: false

      - name: Test check-no-prerelease-deps action
        uses: ./check-no-prerelease-deps
        with:
          working-directory: tests

      - name: Test publish-pr-comment action
        if: github.event_name == 'pull_request'
        uses: ./publish-pr-comment
        with:
          github-token: ${{ github.token }}
          header: publish-pr-comment-self-test
          comment-file: tests/fixtures/comment-body.md

      - name: Test check-todos action
        uses: ./check-todos
        with:
          path: tests
          github-token: ${{ github.token }}

      - name: Test coverage-comment action
        if: github.event_name == 'pull_request'
        uses: ./coverage-comment
        with:
          github-token: ${{ github.token }}
          working-directory: tests
          coverage-summary-path: coverage-summary.json

      - name: Run shell tests (BATS)
        uses: ./bats-test
        with:
          test-directory: bats-tests/shell
          github-token: ${{ github.token }}

  self-test-checks:
    name: Self-test typescript-ci-checks workflow
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/typescript-ci-checks.yml
    with:
      working-directory: tests
      guard-versions: true

  self-test-ci-checks:
    name: Self-test ci-checks workflow
    permissions:
      contents: read
    uses: ./.github/workflows/ci-checks.yml
    with:
      setup: 'echo "toolchain ready"'
      format: 'echo "format passed"'
      lint: 'echo "lint passed"'
      build: 'echo "build passed"'
      test: 'echo "test passed"'
