name: CI Checks

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: 'ubuntu-latest'
      working-directory:
        required: false
        type: string
        default: '.'
      setup:
        required: false
        type: string
        default: ''
      format:
        required: true
        type: string
      lint:
        required: true
        type: string
      build:
        required: true
        type: string
      test:
        required: true
        type: string

jobs:
  format:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - if: inputs.setup != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.setup }}
      - working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.format }}

  lint:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - if: inputs.setup != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.setup }}
      - working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.lint }}

  build:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - if: inputs.setup != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.setup }}
      - working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.build }}

  test:
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - if: inputs.setup != ''
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.setup }}
      - working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test }}
